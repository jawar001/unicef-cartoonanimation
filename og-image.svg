<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF5E8"/>
      <stop offset="100%" stop-color="#F0E8D5"/>
    </linearGradient>
    <linearGradient id="og-shield" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E85D4A"/><stop offset="100%" stop-color="#B33325"/></linearGradient>
    <radialGradient id="og-glow" cx="20%" cy="20%" r="80%"><stop offset="0%" stop-color="#FDFAF2" stop-opacity="0.85"/><stop offset="100%" stop-color="#D4A853" stop-opacity="0"/></radialGradient>
    <radialGradient id="og-fur" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#F5C97A"/><stop offset="100%" stop-color="#A87D2A"/></radialGradient>
    <filter id="og-grain"><feTurbulence baseFrequency="0.85" numOctaves="2" seed="3"/><feColorMatrix values="0 0 0 0 0.9  0 0 0 0 0.85  0 0 0 0 0.7  0 0 0 0.15 0"/><feComposite in2="SourceGraphic" operator="in"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <g opacity="0.45" filter="url(#og-grain)"><rect width="1200" height="630" fill="#E4D9C0"/></g>
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <!-- Logo + wordmark -->
  <g transform="translate(64 64)">
    <svg viewBox="0 0 64 64" width="80" height="80" x="0" y="0">
      <path d="M16 14 L22 8 L26 14 L32 6 L38 14 L42 8 L48 14 L48 18 L16 18 Z" fill="#D4A853" stroke="#A87D2A" stroke-width="1.2" stroke-linejoin="round"/>
      <circle cx="32" cy="7" r="1.8" fill="#4A2C6B"/>
      <path d="M14 20 L50 20 L50 36 Q50 50 32 58 Q14 50 14 36 Z" fill="url(#og-shield)" stroke="#3D2314" stroke-width="1.4"/>
      <ellipse cx="32" cy="40" rx="7" ry="5.5" fill="#FAF5E8"/>
      <ellipse cx="24" cy="32" rx="3" ry="3.6" fill="#FAF5E8"/>
      <ellipse cx="29" cy="28" rx="2.8" ry="3.4" fill="#FAF5E8"/>
      <ellipse cx="35" cy="28" rx="2.8" ry="3.4" fill="#FAF5E8"/>
      <ellipse cx="40" cy="32" rx="3" ry="3.6" fill="#FAF5E8"/>
    </svg>
    <text x="100" y="52" font-family="Cinzel, Georgia, serif" font-weight="700" font-size="32" fill="#4A2C6B">Château Barkalot</text>
  </g>

  <!-- Headline -->
  <text x="64" y="320" font-family="Cinzel, Georgia, serif" font-weight="700" font-size="78" fill="#3D2314">Where Every Pup</text>
  <text x="64" y="404" font-family="Cinzel, Georgia, serif" font-weight="700" font-size="78" fill="#E85D4A">Is Knighted.</text>
  <text x="64" y="468" font-family="Nunito, sans-serif" font-weight="500" font-size="26" fill="#5C3520">A cozy Camelot for coffee, pastries, and the pack.</text>

  <!-- Hero scene right (golden retriever knight) -->
  <g transform="translate(820 180)">
    <ellipse cx="100" cy="320" rx="160" ry="22" fill="#241209" opacity="0.3"/>
    <path d="M-10 200 Q100 170 210 200 L230 320 L-30 320 Z" fill="url(#og-shield)" stroke="#B33325" stroke-width="2.5"/>
    <ellipse cx="100" cy="220" rx="120" ry="70" fill="url(#og-fur)"/>
    <ellipse cx="100" cy="100" rx="115" ry="115" fill="url(#og-fur)"/>
    <path d="M0 70 Q-22 130 0 200 Q26 188 24 145 Q26 95 14 70 Z" fill="#A87D2A" stroke="#5C3520" stroke-width="1.5"/>
    <path d="M200 70 Q222 130 200 200 Q174 188 176 145 Q174 95 186 70 Z" fill="#A87D2A" stroke="#5C3520" stroke-width="1.5"/>
    <ellipse cx="100" cy="130" rx="46" ry="36" fill="#F5C97A"/>
    <ellipse cx="100" cy="142" rx="13" ry="9" fill="#3D2314"/>
    <ellipse cx="68" cy="92" rx="14" ry="17" fill="#FDFAF2"/>
    <ellipse cx="132" cy="92" rx="14" ry="17" fill="#FDFAF2"/>
    <ellipse cx="70" cy="96" rx="8" ry="10" fill="#3D2314"/>
    <ellipse cx="134" cy="96" rx="8" ry="10" fill="#3D2314"/>
    <circle cx="73" cy="92" r="2.6" fill="#FDFAF2"/>
    <circle cx="137" cy="92" r="2.6" fill="#FDFAF2"/>
    <!-- Crown on head -->
    <path d="M40 30 L60 0 L80 30 L100 -10 L120 30 L140 0 L160 30 L160 50 L40 50 Z" fill="#D4A853" stroke="#A87D2A" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="100" cy="0" r="4" fill="#E85D4A"/>
  </g>

  <!-- Hark badge -->
  <g transform="translate(64 540)">
    <rect width="280" height="56" rx="28" fill="#4A2C6B"/>
    <text x="140" y="36" font-family="Cinzel, Georgia, serif" font-weight="600" font-size="22" fill="#FAF5E8" text-anchor="middle" letter-spacing="2">CHATEAUBARKALOT.COM</text>
  </g>
</svg>
